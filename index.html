<script>
let lead={},reportData={},chart1,chart2;

function parseNumber(val){
 if(!val) return 0;
 return parseFloat(val.toString().replace(/,/g,'')) || 0;
}

const TRADE_DATA={
 Electrician:{gl:.005,auto:.018,inland:.008,umbrella:.002,payroll:.32,wcRate:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umbrella:.0025,payroll:.35,wcRate:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umbrella:.002,payroll:.30,wcRate:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umbrella:.0025,payroll:.34,wcRate:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umbrella:.003,payroll:.38,wcRate:6.5}
};

function getBenchmarks(trade,revenue){
const t=TRADE_DATA[trade];
const payroll=revenue*t.payroll;
const wc=(payroll/100)*t.wcRate;
return{
 gl:revenue*t.gl,
 wc:wc,
 auto:revenue*t.auto,
 equip:revenue*t.inland,
 umbrella:revenue*t.umbrella
};
}

function submitLead(){
lead={
 business:business.value,
 email:email.value,
 trade:trade.value,
 revenue:parseNumber(revenue.value),
 gl:parseNumber(gl.value),
 wc:parseNumber(wc.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

lead.total=lead.gl+lead.wc+lead.auto+lead.equip+lead.umbrella;

const bench=getBenchmarks(lead.trade,lead.revenue);
reportData={benchmarkTotal:Object.values(bench).reduce((a,b)=>a+b,0),bench};
render();
}

function formatCurrency(num){
 return "$"+Math.round(num).toLocaleString();
}

function calcVariance(actual,benchmark){
 const diff=actual-benchmark;
 const pct=benchmark?((diff/benchmark)*100):0;
 return {diff,pct};
}

function render(){
if(chart1)chart1.destroy();
if(chart2)chart2.destroy();

chart1=new Chart(premiumChart,{type:'bar',data:{labels:['GL','WC','Auto','Equip','Umb'],datasets:[{label:'Current',data:[lead.gl,lead.wc,lead.auto,lead.equip,lead.umbrella]},{label:'Benchmark',data:Object.values(reportData.bench)}]}});

chart2=new Chart(riskChart,{type:'bar',data:{labels:['Total Cost of Insurance vs. Average Cost for Similar Size Company'],datasets:[{data:[lead.total,reportData.benchmarkTotal]}]}});

let variance=((lead.total/reportData.benchmarkTotal)-1)*100;

let alertBox=document.getElementById('dealAlert');
if(variance>25){
 alertBox.innerHTML='<div class="alert red">High Probability You Are Overpaying or Misclassified. Immediate review recommended.</div>';
}else if(variance>10){
 alertBox.innerHTML='<div class="alert orange">Moderate inefficiencies detected. Optimization likely available.</div>';
}else{
 alertBox.innerHTML='<div class="alert green">Your pricing is within expected range. Coverage review still recommended.</div>';
}

function row(name,a,b){
 const v=calcVariance(a,b);
 return `<tr>
<td>${name}</td>
<td>${formatCurrency(a)}</td>
<td>${formatCurrency(b)}</td>
<td>${formatCurrency(v.diff)}</td>
<td>${Math.round(v.pct)}%</td>
</tr>`;
}

comparisonTable.innerHTML=`
<tr><th>Coverage</th><th>Current Insurance as Input</th><th>California Benchmark</th><th>Over / Under ($)</th><th>Over / Under (%)</th></tr>
${row('General Liability',lead.gl,reportData.bench.gl)}
${row('Workers Comp',lead.wc,reportData.bench.wc)}
${row('Commercial Auto',lead.auto,reportData.bench.auto)}
${row('Inland Marine',lead.equip,reportData.bench.equip)}
${row('Umbrella',lead.umbrella,reportData.bench.umbrella)}
${row('TOTAL',lead.total,reportData.benchmarkTotal)}
`;

summary.innerText=`Total Cost of Insurance vs. Average Cost for Similar Size Company

Your Total: ${formatCurrency(lead.total)}
Benchmark: ${formatCurrency(reportData.benchmarkTotal)}

Risk of having to overbid (labor, materials & insurance): ${formatCurrency(Math.max(0,lead.total-reportData.benchmarkTotal))}`;

report.style.display='block';
leadCard.style.display='none';
}

const {jsPDF}=window.jspdf;

// PAGE 1

// PAGE 2

doc.addImage(img2,'PNG',10,20,180,60);

doc.setFontSize(8);
doc.text('Copyright 2024 Albano Insurance Solutions | All Rights Reserved',10,290);

doc.text('Next Step: Schedule a strategy review with Albano Insurance Solutions.',10,130);

doc.save('Albano-Risk-Report.pdf');
}

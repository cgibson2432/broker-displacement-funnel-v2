<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Broker Displacement Engine v6</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --navy:#0b2a45;
  --blue:#2f80ed;
  --light:#f5f9ff;
  --text:#0a0a0a;
  --card:#ffffff;
  --danger:#d64545;
  --good:#1f9d55;
}

body{margin:0;font-family:'Inter',Arial,sans-serif;background:#fff;color:var(--text);}

.header{
  background:linear-gradient(90deg,var(--navy),#123b5d);
  padding:18px 24px;
  color:#fff;
}

.brand{font-size:18px;font-weight:700;}

.container{max-width:1100px;margin:auto;padding:24px;}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:18px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
  border:1px solid #e7eef8;
}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d6e6ff;
  margin:6px 0;
  font-family:'Inter';
}

.btn{
  background:var(--navy);
  color:#fff;
  font-weight:700;
  border:none;
  padding:14px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

.btn.secondary{background:var(--blue);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
canvas{background:#fff;border-radius:10px;padding:10px;height:320px !important;}

.question{padding:12px;border:1px solid #e6eef7;border-radius:10px;margin:8px 0;}
.label{font-weight:600;font-size:13px;}
.subtle{opacity:.7;font-size:13px;}

.highlight-danger{color:var(--danger);font-weight:700;}
.highlight-good{color:var(--good);font-weight:700;}

.big-headline{font-size:22px;font-weight:800;line-height:1.3;}
.subhead{font-size:14px;opacity:.8;}

</style>
</head>
<body>

<div class="header">
  <div class="brand">Albano Insurance Solutions | Broker Displacement Engine v6</div>
</div>

<div class="container">

<!-- LEAD FORM -->
<div class="card" id="leadCard">
  <div class="big-headline">Your insurance broker may already be costing you jobs.</div>
  <div class="subhead">We reverse-engineer California underwriting standards to expose hidden bid leakage.</div>

  <input id="business" placeholder="Business Name">
  <input id="contact" placeholder="Contact Name">
  <input id="email" placeholder="Email">

  <select id="trade" onchange="loadQuestions()">
    <option value="Electrician">Electrician</option>
    <option value="Plumber">Plumber</option>
    <option value="Painter">Painter</option>
    <option value="HVAC">HVAC</option>
    <option value="General Contractor">General Contractor</option>
  </select>

  <input id="revenue" placeholder="Annual Revenue ($)">
  <input id="currentPremium" placeholder="Current Insurance Cost ($)">

  <div id="dynamicQuestions"></div>

  <label><input type="checkbox" id="consent"> I authorize benchmark analysis</label>

  <button class="btn" onclick="submitLead()">Expose My Broker Gap</button>
</div>

<!-- REPORT -->
<div class="card" id="report" style="display:none">

  <div class="big-headline">Broker Displacement Report</div>
  <p id="executiveInsight"></p>

  <div class="grid">
    <canvas id="premiumChart"></canvas>
    <canvas id="riskChart"></canvas>
  </div>

  <div class="card">
    <h3>Displacement Intelligence</h3>
    <p id="analysisText"></p>
  </div>

  <div class="card">
    <h3>Broker Inefficiency Score</h3>
    <p id="brokerScoreText"></p>
  </div>

  <button class="btn secondary" onclick="downloadPDF()">Download Executive PDF</button>
</div>

</div>

<script>
let lead={}, reportData={};

const QUESTIONS={
  Electrician:["Live wire work?","Height exposure 0–10?","Subcontractors used?"],
  Plumber:["Underground work?","Water damage risk 0–10?","Prior water claims?"],
  Painter:["Ladder/scaffold work?","Chemical exposure?","Overspray risk 0–10?"],
  HVAC:["Roof installs?","Electrical/refrigerant exposure 0–10?","Subs used?"],
  "General Contractor":["% subcontracted?","Project complexity 0–10?","Multi-trade projects?"]
};

function loadQuestions(){
  const t=trade.value;
  const box=document.getElementById('dynamicQuestions');
  box.innerHTML="";
  (QUESTIONS[t]||[]).forEach((q,i)=>{
    box.innerHTML+=`<div class='question'><div class='label'>${q}</div><input id='q${i}'></div>`;
  });
}

loadQuestions();

function submitLead(){
  if(!consent.checked){alert('Consent required');return;}

  lead={
    business:business.value,
    contact:contact.value,
    email:email.value,
    trade:trade.value,
    revenue:+revenue.value,
    premium:+currentPremium.value
  };

  let exposure=0;
  document.querySelectorAll('#dynamicQuestions input').forEach(i=>exposure+=+i.value||0);

  const rate={Electrician:.006,Plumber:.0065,HVAC:.0062,Painter:.0058,"General Contractor":.0075}[lead.trade]||.006;

  const industry=lead.revenue*rate;
  const adjusted=industry*(1+(exposure/30));

  const gap=Math.max(0,lead.premium-industry);

  const inefficiency=Math.min(100,Math.round((gap/(industry||1))*100));

  const jobsLost=Math.round(gap/7500);

  reportData={industry,adjusted,exposure,gap,inefficiency,jobsLost};

  render();

  report.style.display='block';
  leadCard.style.display='none';
}

function render(){

  new Chart(premiumChart,{type:'bar',data:{labels:['Current','Industry','Adjusted'],datasets:[{data:[lead.premium,reportData.industry,reportData.adjusted]}]}});

  new Chart(riskChart,{type:'doughnut',data:{labels:['Exposure','Stable'],datasets:[{data:[reportData.exposure,100-reportData.exposure]}]}});

  executiveInsight.innerHTML=
  `<span class='highlight-danger'>If your broker is not actively benchmarking you, you are likely overexposed in the California market.</span>`;

  analysisText.innerText=
`Trade: ${lead.trade}
Revenue: $${lead.revenue.toLocaleString()}
Current Premium: $${lead.premium.toLocaleString()}

Market Benchmark: $${Math.round(reportData.industry).toLocaleString()}
Risk Adjusted: $${Math.round(reportData.adjusted).toLocaleString()}

Estimated Bid Leakage: $${Math.round(reportData.gap).toLocaleString()}
Jobs Potentially Lost: ${reportData.jobsLost}`;

  brokerScoreText.innerHTML=
  `Broker Inefficiency Score: <span class='highlight-danger'>${reportData.inefficiency}/100</span><br>
  Higher scores indicate missed optimization opportunities in your current insurance program.`;
}

function downloadPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  doc.setFontSize(16);
  doc.text("Broker Displacement Report",10,10);

  doc.setFontSize(11);
  doc.text(`Business: ${lead.business}`,10,20);
  doc.text(`Trade: ${lead.trade}`,10,30);
  doc.text(`Revenue: $${lead.revenue}`,10,40);
  doc.text(`Current Premium: $${lead.premium}`,10,50);

  doc.text(`Industry Benchmark: $${Math.round(reportData.industry)}`,10,65);
  doc.text(`Risk Adjusted: $${Math.round(reportData.adjusted)}`,10,75);

  doc.setTextColor(200,0,0);
  doc.text(`Broker Inefficiency Score: ${reportData.inefficiency}/100`,10,90);

  doc.setTextColor(0,0,0);
  doc.text(`Estimated Jobs Lost: ${reportData.jobsLost}`,10,100);

  doc.save("broker-displacement-report.pdf");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#f7f9fc;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:20px;font-size:22px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,.08);margin-bottom:20px;}
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{background:#0b2a45;color:#fff;padding:14px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<h3>Identify hidden cost & risk in your insurance program</h3>
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<input id="cslb" placeholder="CSLB #">

<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>

<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance Premium Input</h4>

<input id="wcCarrier" placeholder="Current WC Insurance Company">
<input id="wcRenewal" placeholder="WC Premium Renewal Date">
<input id="wc" placeholder="Workers Comp Premium ($)">

<input id="gl" placeholder="General Liability ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button onclick="lookupCSLB()">Auto-Fill from CSLB</button>
<button onclick="submitLead()">Generate Report</button>
</div>

<div class="card" id="report" style="display:none">
<p id="summary"></p>
</div>

</div>

<script>
function parseNumber(v){return parseFloat((v||'').replace(/,/g,''))||0}

// IMPORTANT: CSLB LOOKUP PLACEHOLDER
async function lookupCSLB(){
const license=document.getElementById('cslb').value;

alert("CSLB lookup requires a backend (Make or server) due to CORS restrictions.\n\nNext step: connect this to your Make webhook to scrape CSLB.");

// Example for production:
// fetch('YOUR_MAKE_WEBHOOK',{method:'POST',body:JSON.stringify({cslb:license})})
// .then(res=>res.json())
// .then(data=>{
//   wcCarrier.value=data.carrier;
//   wcRenewal.value=data.expiration;
// });
}

function submitLead(){
let lead={
 business:business.value,
 email:email.value,
 cslb:cslb.value,
 wcCarrier:wcCarrier.value,
 wcRenewal:wcRenewal.value,
 wc:parseNumber(wc.value),
 gl:parseNumber(gl.value),
 auto:parseNumber(auto.value),
 equip:parseNumber(equip.value),
 umbrella:parseNumber(umbrella.value)
};

lead.total=lead.wc+lead.gl+lead.auto+lead.equip+lead.umbrella;

summary.innerText=`CSLB #: ${lead.cslb}\nWC Carrier: ${lead.wcCarrier}\nRenewal: ${lead.wcRenewal}\n\nTotal Insurance: $${lead.total.toLocaleString()}`;

report.style.display='block';
leadCard.style.display='none';
}
</script>

</body>
</html>

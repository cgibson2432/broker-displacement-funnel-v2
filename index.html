<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albano Insurance Solutions | Insurance Risk Analysis Report v8.3</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#fff;color:#0a0a0a;}
.header{background:#0b2a45;color:#fff;padding:18px;font-weight:700;}
.container{max-width:1100px;margin:auto;padding:24px;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:16px;box-shadow:0 6px 18px rgba(0,0,0,0.08);} 
input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ddd;}
.btn{background:#0b2a45;color:#fff;padding:12px;border:none;border-radius:8px;cursor:pointer;width:100%;font-weight:700;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
canvas{height:260px !important;}
.table{width:100%;border-collapse:collapse;margin-top:10px;}
.table td,.table th{border:1px solid #ddd;padding:8px;font-size:13px;}
.highlight{background:#fdeaea;font-weight:700;}
.alert{padding:10px;border-radius:8px;margin-top:10px;font-weight:600;}
.red{background:#fdeaea;color:#b30000;}
.orange{background:#fff5e6;color:#b26b00;}
.green{background:#e6f6ec;color:#1f9d55;}
</style>
</head>
<body>

<div class="header">Albano Insurance Solutions | Insurance Risk Analysis Report</div>

<div class="container">

<div class="card" id="leadCard">
<h2>Find hidden cost & risk in your insurance program</h2>
<input id="business" placeholder="Business Name">
<input id="email" placeholder="Email">
<select id="trade">
<option>Electrician</option>
<option>Plumber</option>
<option>Painter</option>
<option>HVAC</option>
<option>General Contractor</option>
</select>
<input id="revenue" placeholder="Annual Revenue ($)">

<h4>Current Insurance as Input</h4>
<input id="gl" placeholder="General Liability ($)">
<input id="wc" placeholder="Workers Comp ($)">
<input id="auto" placeholder="Commercial Auto ($)">
<input id="equip" placeholder="Equipment ($)">
<input id="umbrella" placeholder="Umbrella ($)">

<button class="btn" onclick="submitLead()">Generate Report</button>
</div>

<div class="card" id="report" style="display:none">
<h2>Insurance Risk Analysis Report</h2>

<div id="dealAlert"></div>

<div class="grid">
<canvas id="premiumChart"></canvas>
<canvas id="riskChart"></canvas>
</div>

<table class="table" id="comparisonTable"></table>
<p id="summary"></p>

<button class="btn" onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script>
let lead={},reportData={},chart1,chart2;

const TRADE_DATA={
 Electrician:{gl:.005,auto:.018,inland:.008,umbrella:.002,payroll:.32,wcRate:4.5},
 Plumber:{gl:.006,auto:.02,inland:.01,umbrella:.0025,payroll:.35,wcRate:5.5},
 Painter:{gl:.0045,auto:.015,inland:.007,umbrella:.002,payroll:.30,wcRate:6},
 HVAC:{gl:.0055,auto:.02,inland:.009,umbrella:.0025,payroll:.34,wcRate:5},
 "General Contractor":{gl:.007,auto:.022,inland:.012,umbrella:.003,payroll:.38,wcRate:6.5}
};

function getBenchmarks(trade,revenue){
const t=TRADE_DATA[trade];
const payroll=revenue*t.payroll;
const wc=(payroll/100)*t.wcRate;
return{
 gl:revenue*t.gl,
 wc:wc,
 auto:revenue*t.auto,
 equip:revenue*t.inland,
 umbrella:revenue*t.umbrella
};
}

function submitLead(){
lead={
 business:business.value,
 email:email.value,
 trade:trade.value,
 revenue:+revenue.value,
 gl:+gl.value||0,
 wc:+wc.value||0,
 auto:+auto.value||0,
 equip:+equip.value||0,
 umbrella:+umbrella.value||0
};
lead.total=lead.gl+lead.wc+lead.auto+lead.equip+lead.umbrella;

const bench=getBenchmarks(lead.trade,lead.revenue);
reportData={benchmarkTotal:Object.values(bench).reduce((a,b)=>a+b,0),bench};
render();
}

function render(){
if(chart1)chart1.destroy();
if(chart2)chart2.destroy();

chart1=new Chart(premiumChart,{type:'bar',data:{labels:['GL','WC','Auto','Equip','Umb'],datasets:[{label:'Current',data:[lead.gl,lead.wc,lead.auto,lead.equip,lead.umbrella]},{label:'Benchmark',data:Object.values(reportData.bench)}]}});

chart2=new Chart(riskChart,{type:'bar',data:{labels:['Total vs Benchmark'],datasets:[{data:[lead.total,reportData.benchmarkTotal]}]}});

let variance=((lead.total/reportData.benchmarkTotal)-1)*100;

// DEAL CLOSING ALERT
let alertBox=document.getElementById('dealAlert');
if(variance>25){
 alertBox.innerHTML='<div class="alert red">High Probability You Are Overpaying or Misclassified. Immediate review recommended.</div>';
}else if(variance>10){
 alertBox.innerHTML='<div class="alert orange">Moderate inefficiencies detected. Optimization likely available.</div>';
}else{
 alertBox.innerHTML='<div class="alert green">Your pricing is within expected range. Coverage review still recommended.</div>';
}

comparisonTable.innerHTML=`
<tr><th>Coverage</th><th>Current</th><th>Benchmark</th></tr>
<tr><td>GL</td><td>$${lead.gl}</td><td>$${Math.round(reportData.bench.gl)}</td></tr>
<tr><td>WC</td><td>$${lead.wc}</td><td>$${Math.round(reportData.bench.wc)}</td></tr>
<tr><td>Auto</td><td>$${lead.auto}</td><td>$${Math.round(reportData.bench.auto)}</td></tr>
<tr><td>Equip</td><td>$${lead.equip}</td><td>$${Math.round(reportData.bench.equip)}</td></tr>
<tr><td>Umbrella</td><td>$${lead.umbrella}</td><td>$${Math.round(reportData.bench.umbrella)}</td></tr>`;

summary.innerText=`Your total insurance cost is ${Math.round(variance)}% ${variance>0?'above':'below'} California benchmarks.\nRisk of overbidding: $${Math.round(Math.max(0,lead.total-reportData.benchmarkTotal))}`;

report.style.display='block';
leadCard.style.display='none';
}

function downloadPDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
const img1=premiumChart.toDataURL();
const img2=riskChart.toDataURL();

doc.text('Insurance Risk Analysis Report',10,10);
doc.addImage(img1,'PNG',10,20,180,60);
doc.addPage();
doc.addImage(img2,'PNG',10,20,180,60);
doc.text(summary.innerText,10,100);
doc.text('Next Step: Schedule a strategy review with Albano Insurance Solutions.',10,130);
doc.save('Albano-Risk-Report.pdf');
}
</script>

</body>
</html>
